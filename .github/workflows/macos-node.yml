name: macOS Node Smoke Test

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run launcher smoke test
        run: npm run smoke
